  # 生产阶段文件管理
  /user/projects/{id}/production/files:
    get:
      tags:
        - 生产文件管理
      summary: 获取项目生产阶段文件列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: stage
          in: query
          schema:
            type: string
            enum: [scheme, preliminary, construction, change, completion]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 生产阶段文件列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductionFile'
                  total:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - 生产文件管理
      summary: 上传生产阶段文件
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - stage
                - file_type
              properties:
                file:
                  type: string
                  format: binary
                stage:
                  type: string
                  enum: [scheme, preliminary, construction, change, completion]
                file_type:
                  type: string
                  enum: [scheme_ppt, preliminary_design, construction_drawing, variation_order, completion_report, audit_report, other]
                default_amount_reference:
                  type: string
                  description: 默认金额参考说明
                review_sheet_file:
                  type: string
                  format: binary
                  description: 校审单文件（方案、初步设计、施工图设计必填）
                score:
                  type: number
                  format: float
                  description: 评分（方案、初步设计、施工图设计必填，0-100）
                description:
                  type: string
      responses:
        '201':
          description: 生产阶段文件上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductionFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

