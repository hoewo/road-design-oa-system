                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 用户名或邮箱已存在
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/users/{id}:
    get:
      tags:
        - 用户管理
      summary: 获取用户详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 用户详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - 用户管理
      summary: 更新用户
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 用户更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # 公司收入管理
  /user/company/revenue:
    get:
      tags:
        - 公司收入管理
      summary: 获取公司收入统计
      description: 需要财务人员权限
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: 开始日期
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: 结束日期
      responses:
        '200':
          description: 公司收入统计
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CompanyRevenue'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 无权限访问公司收入信息

  # 公司配置管理
  /user/company/config:
    put:
      tags:
        - 公司收入管理
      summary: 设置管理费比例
      description: 需要财务人员权限。设置公司管理费比例（0-100），用于计算公司收入统计
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - management_fee_ratio
              properties:
                management_fee_ratio:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 100
                  description: 管理费比例（0-100）
                  example: 15.5
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      management_fee_ratio:
                        type: number
                        format: float
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 无权限，需要财务人员权限

  # 甲方管理
  /user/clients:
    get:
      tags:
        - 甲方管理
      summary: 获取甲方列表
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: 搜索关键词（甲方名称）
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 甲方列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - 甲方管理
      summary: 创建甲方
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: 甲方创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 甲方名称已存在
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/clients/{id}:
    get:
      tags:
        - 甲方管理
      summary: 获取甲方详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 甲方详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Client'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - 甲方管理
      summary: 更新甲方
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: 甲方更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    delete:
      tags:
        - 甲方管理
      summary: 删除甲方
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 甲方删除成功
        '400':
          description: 甲方已被项目使用，无法删除
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    HeaderAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 网关验证JWT Token后注入用户信息到Header，后端从Header中读取用户信息（X-User-ID, X-User-Username等）

  schemas:
    # 基础类型
    UUID:
      type: string
      format: uuid
      description: UUID v4格式的字符串
    
    DateTime:
      type: string
      format: date-time
    
    # 项目相关
    Project:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        project_name:
          type: string
          example: "某道路设计项目"
        project_number:
          type: string
          example: "2025-001"
        start_date:
          $ref: '#/components/schemas/DateTime'
        project_overview:
          type: string
        drawing_unit:
          type: string
        status:
          type: string
          enum: [planning, bidding, contract, production, completed, cancelled]
        business_manager_id:
          $ref: '#/components/schemas/UUID'
        production_manager_id:
          $ref: '#/components/schemas/UUID'
        is_deleted:
          type: boolean
        management_fee_ratio:
          type: number
          format: float
        client_id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            business_manager:
              $ref: '#/components/schemas/User'
            production_manager:
              $ref: '#/components/schemas/User'
            client:
              $ref: '#/components/schemas/Client'
    
    CreateProjectRequest:
      type: object
      required:
        - project_name
        - project_number
      properties:
        project_name:
          type: string
          minLength: 2
          maxLength: 100
        project_number:
          type: string
        start_date:
          $ref: '#/components/schemas/DateTime'
        project_overview:
          type: string
          maxLength: 1000
        drawing_unit:
          type: string
        status:
          type: string
          enum: [planning, bidding, contract, production, completed, cancelled]
        management_fee_ratio:
          type: number
          format: float
          minimum: 0
          maximum: 1
        business_manager_id:
          $ref: '#/components/schemas/UUID'
        production_manager_id:
          $ref: '#/components/schemas/UUID'
    
    UpdateProjectRequest:
      type: object
      properties:
        project_name:
          type: string
          minLength: 2
          maxLength: 100
        project_number:
          type: string
        start_date:
          $ref: '#/components/schemas/DateTime'
        project_overview:
          type: string
          maxLength: 1000
        drawing_unit:
          type: string
        status:
          type: string
          enum: [planning, bidding, contract, production, completed, cancelled]
        business_manager_id:
          $ref: '#/components/schemas/UUID'
        production_manager_id:
          $ref: '#/components/schemas/UUID'
    
    # 用户相关
    User:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
        real_name:
          type: string
        email:
          type: string
        phone:
          type: string
        department:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, project_manager, business_manager, production_manager, finance, member]
        has_account:
          type: boolean
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/DateTime'
    
    # 甲方相关
    Client:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        client_name:
          type: string
        contact_name:
          type: string
        contact_phone:
          type: string
        email:
          type: string
        address:
          type: string
        tax_number:
          type: string
        bank_account:
          type: string
        bank_name:
          type: string
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/DateTime'
    
    CreateClientRequest:
      type: object
      required:
        - client_name
      properties:
        client_name:
          type: string
          minLength: 2
          maxLength: 100
        contact_name:
          type: string
        contact_phone:
          type: string
        email:
          type: string
        address:
          type: string
        tax_number:
          type: string
        bank_account:
          type: string
        bank_name:
          type: string
    
    UpdateClientRequest:
      type: object
      properties:
        client_name:
          type: string
          minLength: 2
          maxLength: 100
        contact_name:
          type: string
        contact_phone:
          type: string
        email:
          type: string
        address:
          type: string
        tax_number:
          type: string
        bank_account:
          type: string
        bank_name:
          type: string
    
    # 合同相关
    Contract:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        contract_number:
          type: string
        project_id:
          $ref: '#/components/schemas/UUID'
        sign_date:
          $ref: '#/components/schemas/DateTime'
        contract_rate:
          type: number
          format: float
        design_fee:
          type: number
          format: float
        survey_fee:
          type: number
          format: float
        consultation_fee:
          type: number
          format: float
        contract_amount:
          type: number
          format: float
        contract_file_id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/DateTime'
    
    ContractDetail:
      allOf:
        - $ref: '#/components/schemas/Contract'
        - type: object
          properties:
            amendments:
              type: array
              items:
                $ref: '#/components/schemas/ContractAmendment'
    
    CreateContractRequest:
      type: object
      required:
        - contract_number
        - sign_date
        - design_fee
        - survey_fee
        - consultation_fee
      properties:
        contract_number:
          type: string
        sign_date:
          $ref: '#/components/schemas/DateTime'
        contract_rate:
          type: number
          format: float
          minimum: 0
          maximum: 100
        design_fee:
          type: number
          format: float
          minimum: 0
        survey_fee:
          type: number
          format: float
          minimum: 0
        consultation_fee:
          type: number
          format: float
          minimum: 0
    
    UpdateContractRequest:
      type: object
      properties:
        sign_date:
          $ref: '#/components/schemas/DateTime'
        contract_rate:
          type: number
          format: float
          minimum: 0
          maximum: 100
        design_fee:
          type: number
          format: float
          minimum: 0
        survey_fee:
          type: number
          format: float
          minimum: 0
        consultation_fee:
          type: number
          format: float
          minimum: 0
    
    ContractAmendment:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        amendment_number:
          type: string
        contract_id:
          $ref: '#/components/schemas/UUID'
        sign_date:
          $ref: '#/components/schemas/DateTime'
        design_fee:
          type: number
          format: float
        survey_fee:
          type: number
          format: float
        consultation_fee:
          type: number
          format: float
        amendment_amount:
          type: number
          format: float
    
    # 财务记录相关
    FinancialRecord:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        project_id:
          $ref: '#/components/schemas/UUID'
        financial_type:
          type: string
          enum: [bonus, cost, client_payment, our_invoice, expert_fee, commission_payment, vendor_invoice]
        direction:
          type: string
          enum: [income, expense]
        amount:
          type: number
          format: float
        occurred_at:
          $ref: '#/components/schemas/DateTime'
        bonus_category:
          type: string
          enum: [business, production]
        recipient_id:
          $ref: '#/components/schemas/UUID'
        cost_category:
          type: string
          enum: [vehicle, accommodation, transport, other]
        mileage:
          type: number
          format: float
        client_id:
          $ref: '#/components/schemas/UUID'
        related_payment_id:
          $ref: '#/components/schemas/UUID'
        payment_method:
          type: string
          enum: [cash, transfer]
        expert_name:
          type: string
        commission_type:
          type: string
          enum: [person, company]
        vendor_name:
          type: string
        vendor_score:
          type: number
          format: float
        related_commission_id:
          $ref: '#/components/schemas/UUID'
        description:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    CreateFinancialRecordRequest:
      type: object
      required:
        - financial_type
        - direction
        - amount
        - occurred_at
      properties:
        financial_type:
          type: string
          enum: [bonus, cost, client_payment, our_invoice, expert_fee, commission_payment, vendor_invoice]
        direction:
          type: string
          enum: [income, expense]
        amount:
          type: number
          format: float
          minimum: 0
        occurred_at:
          $ref: '#/components/schemas/DateTime'
        bonus_category:
          type: string
          enum: [business, production]
        recipient_id:
          $ref: '#/components/schemas/UUID'
        cost_category:
          type: string
          enum: [taxi, accommodation, public_transport]
        mileage:
          type: number
          format: float
        client_id:
          $ref: '#/components/schemas/UUID'
        related_payment_id:
          $ref: '#/components/schemas/UUID'
        payment_method:
          type: string
          enum: [cash, transfer]
        expert_name:
          type: string
        commission_type:
          type: string
          enum: [person, company]
        vendor_name:
          type: string
        vendor_score:
          type: number
          format: float
        related_commission_id:
          $ref: '#/components/schemas/UUID'
        description:
          type: string
    
    UpdateFinancialRecordRequest:
      type: object
      properties:
        amount:
          type: number
          format: float
          minimum: 0
        occurred_at:
          $ref: '#/components/schemas/DateTime'
        bonus_category:
          type: string
          enum: [business, production]
        recipient_id:
          $ref: '#/components/schemas/UUID'
        cost_category:
          type: string
          enum: [taxi, accommodation, public_transport]
        mileage:
          type: number
          format: float
        client_id:
          $ref: '#/components/schemas/UUID'
        related_payment_id:
          $ref: '#/components/schemas/UUID'
        payment_method:
          type: string
          enum: [cash, transfer]
        expert_name:
          type: string
        commission_type:
          type: string
          enum: [person, company]
        vendor_name:
          type: string
        vendor_score:
          type: number
          format: float
        related_commission_id:
          $ref: '#/components/schemas/UUID'
        description:
          type: string
    
    # 文件相关
    File:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        file_name:
          type: string
        original_name:
          type: string
        file_path:
          type: string
        file_size:
          type: integer
          format: int64
        mime_type:
          type: string
        category:
          type: string
          enum: [contract_main, contract_amendment, contract_external, tender, bid, award_notice, scheme_ppt, preliminary_design, construction_drawing, variation_order, completion_report, audit_report, invoice]
        description:
          type: string
        project_id:
          $ref: '#/components/schemas/UUID'
        uploader_id:
          $ref: '#/components/schemas/UUID'
        deleted_at:
          $ref: '#/components/schemas/DateTime'
        created_at:
          $ref: '#/components/schemas/DateTime'
    
    # 项目经营信息
    ProjectBusiness:
      type: object
      properties:
        project_id:
          $ref: '#/components/schemas/UUID'
        client:
          $ref: '#/components/schemas/Client'
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/Contract'
        financial_records:
          type: array
          items:
            $ref: '#/components/schemas/FinancialRecord'
        statistics:
          type: object
          properties:
            total_receivable:
              type: number
              format: float
            total_paid:
              type: number
              format: float
            total_unpaid:
              type: number
              format: float
    
    UpdateProjectBusinessRequest:
      type: object
      properties:
        client_id:
          $ref: '#/components/schemas/UUID'
    
    # 补充协议相关
    CreateContractAmendmentRequest:
      type: object
      required:
        - amendment_number
        - sign_date
        - design_fee
        - survey_fee
        - consultation_fee
      properties:
        amendment_number:
          type: string
        sign_date:
          $ref: '#/components/schemas/DateTime'
        contract_rate:
          type: number
          format: float
          minimum: 0
          maximum: 100
        design_fee:
          type: number
          format: float
          minimum: 0
        survey_fee:
          type: number
          format: float
          minimum: 0
        consultation_fee:
          type: number
          format: float
          minimum: 0
        description:
          type: string
    
    UpdateContractAmendmentRequest:
      type: object
      properties:
        sign_date:
          $ref: '#/components/schemas/DateTime'
        contract_rate:
          type: number
          format: float
          minimum: 0
          maximum: 100
        design_fee:
          type: number
          format: float
          minimum: 0
        survey_fee:
          type: number
          format: float
          minimum: 0
        consultation_fee:
          type: number
          format: float
          minimum: 0
        description:
          type: string
    
    # 招投标信息相关
    BiddingInfo:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        project_id:
          $ref: '#/components/schemas/UUID'
        tender_file_ids:
          type: array
          items:
          $ref: '#/components/schemas/UUID'
          description: 招标文件ID数组，支持多个文件
        tender_files:
          type: array
          items:
            $ref: '#/components/schemas/File'
          description: 招标文件详情（关联查询）
        bid_file_ids:
          type: array
          items:
          $ref: '#/components/schemas/UUID'
          description: 投标文件ID数组，支持多个文件
        bid_files:
          type: array
          items:
            $ref: '#/components/schemas/File'
          description: 投标文件详情（关联查询）
        award_notice_file_ids:
          type: array
          items:
          $ref: '#/components/schemas/UUID'
          description: 中标通知书文件ID数组，支持多个文件
        award_notice_files:
          type: array
          items:
            $ref: '#/components/schemas/File'
          description: 中标通知书文件详情（关联查询）
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    UpdateBiddingInfoRequest:
      type: object
      properties:
        tender_file_ids:
          type: array
          items:
          $ref: '#/components/schemas/UUID'
          description: 招标文件ID数组，支持多个文件
        bid_file_ids:
          type: array
          items:
          $ref: '#/components/schemas/UUID'
          description: 投标文件ID数组，支持多个文件
        award_notice_file_ids:
          type: array
          items:
          $ref: '#/components/schemas/UUID'
          description: 中标通知书文件ID数组，支持多个文件
    
    CreateExpertFeePaymentRequest:
      type: object
      required:
        - expert_name
        - amount
        - occurred_at
        - payment_method
      properties:
        expert_name:
          type: string
          minLength: 2
          maxLength: 50
          description: 专家姓名
        amount:
          type: number
          format: float
          minimum: 0
          description: 支付金额
        occurred_at:
          $ref: '#/components/schemas/DateTime'
          description: 支付日期
        payment_method:
          type: string
          enum: [cash, transfer]
          description: 支付方式（现金/转账）
        description:
          type: string
          description: 备注信息（可选）
    
    UpdateExpertFeePaymentRequest:
      type: object
      properties:
        expert_name:
          type: string
          minLength: 2
          maxLength: 50
          description: 专家姓名
        amount:
          type: number
          format: float
          minimum: 0
          description: 支付金额
        occurred_at:
          $ref: '#/components/schemas/DateTime'
          description: 支付日期
        payment_method:
          type: string
          enum: [cash, transfer]
          description: 支付方式（现金/转账）
        description:
          type: string
          description: 备注信息
    
    # 项目生产信息
    ProjectProduction:
      type: object
      properties:
        project_id:
          $ref: '#/components/schemas/UUID'
        members:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMember'
        production_files:
          type: array
          items:
            $ref: '#/components/schemas/ProductionFile'
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/ProductionApproval'
        external_commissions:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCommission'
    
    # 生产阶段文件相关
    ProductionFile:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        project_id:
          $ref: '#/components/schemas/UUID'
        stage:
          type: string
          enum: [scheme, preliminary, construction, change, completion]
        file_id:
          $ref: '#/components/schemas/UUID'
        review_sheet_file_id:
          $ref: '#/components/schemas/UUID'
        score:
          type: number
          format: float
        description:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    # 批复审计信息相关
    ProductionApproval:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        project_id:
          $ref: '#/components/schemas/UUID'
        approval_type:
          type: string
          enum: [approval, audit]
        approver_id:
          $ref: '#/components/schemas/UUID'
        status:
          type: string
          enum: [pending, approved]
        signed_at:
          $ref: '#/components/schemas/DateTime'
        report_file_id:
          $ref: '#/components/schemas/UUID'
        amount_design:
          type: number
          format: float
        amount_survey:
          type: number
          format: float
        amount_consulting:
          type: number
          format: float
        total_amount:
          type: number
          format: float
        source_contract_id:
          $ref: '#/components/schemas/UUID'
        override_reason:
          type: string
        remarks:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    CreateProductionApprovalRequest:
      type: object
      required:
        - approval_type
        - amount_design
        - amount_survey
        - amount_consulting
      properties:
        approval_type:
          type: string
          enum: [approval, audit]
        approver_id:
          $ref: '#/components/schemas/UUID'
        report_file_id:
          $ref: '#/components/schemas/UUID'
        amount_design:
          type: number
          format: float
          minimum: 0
        amount_survey:
          type: number
          format: float
          minimum: 0
        amount_consulting:
          type: number
          format: float
          minimum: 0
        source_contract_id:
          $ref: '#/components/schemas/UUID'
        override_reason:
          type: string
        remarks:
          type: string
    
    UpdateProductionApprovalRequest:
      type: object
      properties:
        approver_id:
          $ref: '#/components/schemas/UUID'
        status:
          type: string
          enum: [pending, approved]
        signed_at:
          $ref: '#/components/schemas/DateTime'
        report_file_id:
          $ref: '#/components/schemas/UUID'
        amount_design:
          type: number
          format: float
          minimum: 0
        amount_survey:
          type: number
          format: float
          minimum: 0
        amount_consulting:
          type: number
          format: float
          minimum: 0
        source_contract_id:
          $ref: '#/components/schemas/UUID'
        override_reason:
          type: string
        remarks:
          type: string
    
    # 对外委托相关
    ExternalCommission:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        project_id:
          $ref: '#/components/schemas/UUID'
        vendor_type:
          type: string
          enum: [person, company]
        vendor_name:
          type: string
        score:
          type: number
          format: float
        contract_file_id:
          $ref: '#/components/schemas/UUID'
        notes:
          type: string
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    CreateExternalCommissionRequest:
      type: object
      required:
        - vendor_type
        - vendor_name
      properties:
        vendor_type:
          type: string
          enum: [person, company]
        vendor_name:
          type: string
          minLength: 2
          maxLength: 100
        score:
          type: number
          format: float
          minimum: 0
          maximum: 100
        contract_file_id:
          $ref: '#/components/schemas/UUID'
        notes:
          type: string
    
    UpdateExternalCommissionRequest:
      type: object
      properties:
        vendor_type:
          type: string
          enum: [person, company]
        vendor_name:
          type: string
          minLength: 2
          maxLength: 100
        score:
          type: number
          format: float
          minimum: 0
          maximum: 100
        contract_file_id:
          $ref: '#/components/schemas/UUID'
        notes:
          type: string
    
    # 项目成员相关
    ProjectMember:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        project_id:
          $ref: '#/components/schemas/UUID'
        user_id:
          $ref: '#/components/schemas/UUID'
        role:
          type: string
          enum: [designer, participant, reviewer, auditor, approver, business_personnel]
        discipline_id:
          $ref: '#/components/schemas/UUID'
        join_date:
          $ref: '#/components/schemas/DateTime'
        leave_date:
          $ref: '#/components/schemas/DateTime'
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    CreateProjectMemberRequest:
      type: object
      required:
        - user_id
        - role
        - join_date
      properties:
        user_id:
          $ref: '#/components/schemas/UUID'
        role:
          type: string
          enum: [designer, participant, reviewer, auditor, approver, business_personnel]
        discipline_id:
          $ref: '#/components/schemas/UUID'
        join_date:
          $ref: '#/components/schemas/DateTime'
        leave_date:
          $ref: '#/components/schemas/DateTime'
    
    UpdateProjectMemberRequest:
      type: object
      properties:
        role:
          type: string
          enum: [designer, participant, reviewer, auditor, approver, business_personnel]
        discipline_id:
          $ref: '#/components/schemas/UUID'
        join_date:
          $ref: '#/components/schemas/DateTime'
        leave_date:
          $ref: '#/components/schemas/DateTime'
        is_active:
          type: boolean
    
    # 专业字典相关
    Discipline:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          $ref: '#/components/schemas/DateTime'
    
    CreateDisciplineRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
        code:
          type: string
        description:
          type: string
        is_global:
          type: boolean
          default: true
        project_id:
          $ref: '#/components/schemas/UUID'
    
    UpdateDisciplineRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
        code:
          type: string
        description:
          type: string
    
    # 用户管理相关
    CreateUserRequest:
      type: object
      required:
        - username
        - email
        - real_name
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
        email:
          type: string
          format: email
        real_name:
          type: string
          minLength: 2
          maxLength: 10
        phone:
          type: string
        department:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, project_manager, business_manager, production_manager, finance, member]
        has_account:
          type: boolean
          default: false
    
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        real_name:
          type: string
          minLength: 2
          maxLength: 10
        phone:
          type: string
        department:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, project_manager, business_manager, production_manager, finance, member]
        has_account:
          type: boolean
        is_active:
          type: boolean
    
    # 公司收入相关
    CompanyRevenue:
      type: object
      properties:
        total_receivable:
          type: number
          format: float
          description: 总应收金额
        total_receivable_by_fee_type:
          type: object
          properties:
            design_fee:
              type: number
              format: float
            survey_fee:
              type: number
              format: float
            consultation_fee:
              type: number
              format: float
        total_invoiced:
          type: number
          format: float
          description: 总开票金额
        total_paid:
          type: number
          format: float
          description: 总支付金额
        total_unpaid:
          type: number
          format: float
          description: 总未收金额
        management_fee_ratio:
          type: number
          format: float
          description: 管理费比例
        management_fee:
          type: number
          format: float
          description: 管理费金额
        invoices:
          type: array
          items:
            $ref: '#/components/schemas/FinancialRecord'
          description: 所有发票信息
        payments:
          type: array
          items:
            $ref: '#/components/schemas/FinancialRecord'
          description: 所有支付信息
    
    # 错误响应
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: 未授权访问
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

