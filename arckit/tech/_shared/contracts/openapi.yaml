openapi: 3.0.3
info:
  title: 道路设计公司项目管理系统 API
  description: 基于统一路由格式的项目管理OA系统API文档，遵循 `/{service}/{version}/{auth_level}/{path}` 格式
  version: 1.0.0
  contact:
    name: 开发团队
    email: dev@company.com

servers:
  - url: http://localhost:8080/project-oa/v1
    description: 本地开发环境
  - url: https://api.project-oa.com/project-oa/v1
    description: 生产环境

# 安全定义
# 注意：认证由网关处理，后端从Header中读取用户信息
# 网关验证JWT Token后注入以下Header：
# - X-User-ID: 用户ID（UUID格式）
# - X-User-Username: 用户名
# - X-User-AppID: 应用ID
# - X-User-SessionID: 会话ID（UUID格式）
security:
  - HeaderAuth: []

paths:
  # ==================== Public Routes (无需认证) ====================
  /public/health:
    get:
      tags:
        - 系统
      summary: 健康检查
      description: 系统健康检查接口，无需认证
      security: []
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time

  # ==================== User Routes (需要认证) ====================
  
  # 项目管理
  /user/projects:
    get:
      tags:
        - 项目管理
      summary: 获取项目列表
      description: 获取项目列表，支持分页、搜索、筛选
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [planning, bidding, contract, production, completed, cancelled]
        - name: keyword
          in: query
          schema:
            type: string
            description: 搜索关键词（项目名称、项目编号）
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - 项目管理
      summary: 创建项目
      description: 创建新项目，项目名称和项目编号为必填字段
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 项目创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 项目编号已存在
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/projects/{id}:
    get:
      tags:
        - 项目管理
      summary: 获取项目详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - 项目管理
      summary: 更新项目
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 项目更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    delete:
      tags:
        - 项目管理
      summary: 删除项目（软删除）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 项目删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # 项目经营信息
  /user/projects/{id}/business:
    get:
      tags:
        - 项目经营
      summary: 获取项目经营信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 项目经营信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectBusiness'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - 项目经营
      summary: 更新项目经营信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectBusinessRequest'
      responses:
        '200':
          description: 经营信息更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/projects/{id}/business/export:
    get:
      tags:
        - 项目经营
      summary: 导出项目经营信息统计
      description: 导出项目经营信息统计报表，支持 Excel、PDF、CSV 格式
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          schema:
            type: string
            enum: [excel, pdf, csv]
            default: excel
          description: 导出格式
      responses:
        '200':
          description: 导出文件
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
                description: Excel 格式（format=excel 时）
            application/pdf:
              schema:
                type: string
                format: binary
                description: PDF 格式（format=pdf 时）
            text/csv:
              schema:
                type: string
                format: binary
                description: CSV 格式（format=csv 时）
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/company/revenue/export:
    get:
      tags:
        - 公司收入管理
      summary: 导出公司收入统计
      description: 需要财务人员权限。导出公司收入统计报表，支持 Excel、PDF、CSV 格式
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [excel, pdf, csv]
            default: excel
          description: 导出格式
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: 开始日期
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: 结束日期
      responses:
        '200':
          description: 导出文件
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
                description: Excel 格式（format=excel 时）
            application/pdf:
              schema:
                type: string
                format: binary
                description: PDF 格式（format=pdf 时）
            text/csv:
              schema:
                type: string
                format: binary
                description: CSV 格式（format=csv 时）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 无权限，需要财务人员权限
        '500':
          $ref: '#/components/responses/InternalServerError'

  # 合同管理
  /user/projects/{id}/contracts:
    get:
      tags:
        - 合同管理
      summary: 获取项目合同列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 合同列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contract'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - 合同管理
      summary: 创建合同
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractRequest'
      responses:
        '201':
          description: 合同创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Contract'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/projects/{id}/contracts/{contractId}:
    get:
      tags:
        - 合同管理
      summary: 获取合同详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 合同详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContractDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - 合同管理
      summary: 更新合同
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContractRequest'
      responses:
        '200':
          description: 合同更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # 财务记录
  /user/projects/{id}/financial-records:
    get:
      tags:
        - 财务管理
      summary: 获取项目财务记录列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: financial_type
          in: query
          schema:
            type: string
            enum: [bonus, cost, client_payment, our_invoice, expert_fee, commission_payment, vendor_invoice]
        - name: direction
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 财务记录列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FinancialRecord'
                  total:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - 财务管理
      summary: 创建财务记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFinancialRecordRequest'
      responses:
        '201':
          description: 财务记录创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FinancialRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/projects/{id}/financial-records/{recordId}:
    put:
      tags:
        - 财务管理
      summary: 更新财务记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFinancialRecordRequest'
      responses:
        '200':
          description: 财务记录更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    delete:
      tags:
        - 财务管理
      summary: 删除财务记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 财务记录删除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # 文件管理
  /user/files/search:
    get:
      tags:
        - 文件管理
      summary: 搜索文件
      description: 按项目、文件类型、上传时间和关键词搜索文件
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
          description: 项目 ID
        - name: category
          in: query
          schema:
            type: string
            enum: [contract_main, contract_amendment, contract_external, tender, bid, award_notice, scheme_ppt, preliminary_design, construction_drawing, variation_order, completion_report, audit_report, invoice]
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: 开始日期（上传时间范围筛选）
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: 结束日期（上传时间范围筛选）
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 文件列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      files:
                        type: array
                        items:
                          $ref: '#/components/schemas/File'
                      total:
                        type: integer
                      page:
                        type: integer
                      size:
                        type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
  /user/projects/{id}/files:
    post:
      tags:
        - 文件管理
      summary: 上传文件
      description: 上传文件，最大支持 100MB。支持的文件类型：PDF、Word、Excel、图片等常见文档格式。禁止上传可执行文件、脚本文件等危险类型。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - category
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                  enum: [contract_main, contract_amendment, contract_external, tender, bid, award_notice, scheme_ppt, preliminary_design, construction_drawing, variation_order, completion_report, audit_report, invoice]
                description:
                  type: string
      responses:
        '201':
          description: 文件上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/File'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: 文件大小超过限制（最大100MB）

  /user/files/{fileId}/download:
    get:
      tags:
        - 文件管理
      summary: 下载文件
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 文件内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 无权限访问此文件

  /user/files/{fileId}:
    delete:
      tags:
        - 文件管理
      summary: 删除文件（软删除）
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 文件删除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # 补充协议管理
  /user/projects/{id}/contracts/{contractId}/amendments:
    get:
      tags:
        - 合同管理
      summary: 获取合同补充协议列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 补充协议列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractAmendment'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - 合同管理
      summary: 创建补充协议
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractAmendmentRequest'
      responses:
        '201':
          description: 补充协议创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContractAmendment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/projects/{id}/contracts/{contractId}/amendments/{amendmentId}:
    get:
      tags:
        - 合同管理
      summary: 获取补充协议详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: amendmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 补充协议详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContractAmendment'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - 合同管理
      summary: 更新补充协议
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: amendmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContractAmendmentRequest'
      responses:
        '200':
          description: 补充协议更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    delete:
      tags:
        - 合同管理
      summary: 删除补充协议
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: amendmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 补充协议删除成功
        '404':
          $ref: '#/components/responses/NotFound'
