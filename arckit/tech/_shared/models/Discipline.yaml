entity: Discipline
description: 专业字典实体，支持全局专业列表
status: ✅ 已定义
updated: 2026-03-17

fields:
  - name: ID
    type: uuid
    constraints: primaryKey
  - name: Name
    type: string
    constraints: uniqueIndex, not null
    validation: 必填，2-50字符，全局专业名称唯一
  - name: Description
    type: text
  - name: IsActive
    type: bool
    default: true
  - name: CreatedAt
    type: time.Time
  - name: UpdatedAt
    type: time.Time

business_rules:
  - 全局专业：所有项目可用，由管理员维护
  - 项目成员对专业的使用关系通过关联表表达，不在 Discipline 本体上维护 ProjectID
  - 专业列表由全局字典维护

relationships:
  - "1:N ProjectMember (生产人员专业关联)"
