entity: File
description: 文件实体，支持所有项目活动中产生的文件和发票
status: ✅ 已定义
updated: 2026-03-17

fields:
  - name: ID
    type: uuid
    constraints: primaryKey
  - name: FileName
    type: string
    constraints: not null
    description: 存储文件名
  - name: OriginalName
    type: string
    constraints: not null
    description: 原始文件名，不能包含特殊字符
  - name: FilePath
    type: string
    constraints: not null
    description: "存储路径，格式：projects/{project_id}/{category}/{safeBaseName}_{timestamp}{ext}"
  - name: FileSize
    type: int64
    constraints: not null
    validation: 最大100MB (104857600字节)
  - name: MimeType
    type: string
    constraints: not null
  - name: Category
    type: FileCategory
    constraints: not null
  - name: Description
    type: text
  - name: ProjectID
    type: uuid
    constraints: not null
  - name: UploaderID
    type: uuid
    constraints: not null
  - name: DeletedAt
    type: "*time.Time"
    description: 软删除时间戳
  - name: CreatedAt
    type: time.Time
  - name: UpdatedAt
    type: time.Time

enums:
  FileCategory:
    - contract_main: 主合同文件
    - contract_amendment: 补充协议文件
    - contract_external: 外委合同文件
    - tender: 招标文件
    - bid: 投标文件
    - award_notice: 中标通知书
    - scheme_ppt: 方案PPT
    - preliminary_design: 初步设计
    - construction_drawing: 施工图设计
    - variation_order: 变更洽商
    - completion_report: 竣工验收
    - audit_report: 审计报告
    - invoice: 发票文件

validation:
  forbidden_file_types:
    - .exe, .bat, .cmd, .com, .pif, .scr
    - .vbs, .js, .jar, .sh, .ps1
    - .app, .dmg, .deb, .rpm, .msi, .apk, .ipa

business_rules:
  - 文件存储路径统一格式，兼容MinIO和OSS
  - 支持软删除，删除后保留文件记录但标记为已删除
  - 文件权限验证：用户只能访问有权限的项目文件
  - 支持按项目、文件类型、上传时间搜索和筛选
  - 文件大小上限100MB

relationships:
  - "1:1 Project"
  - "1:1 User (Uploader)"
