services:
  postgres:
    image: postgres:15
    container_name: project-oa-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-project_oa}
      POSTGRES_USER: ${DB_USER:-project_oa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-project_oa_password}
    ports:
      # 开发环境使用 5433 避免冲突，生产环境使用 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - project-oa-network
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-project_oa_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: project-oa-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - project-oa-network
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-oa-backend
    environment:
      # ========================================
      # 业务服务部署配置（业务服务自身运行所需）
      # ========================================
      # SERVER_HOST/SERVER_PORT: 业务服务在容器内监听什么地址和端口
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8082}
      
      # ========================================
      # 服务注册配置（告诉星云Auth网关如何访问此业务服务）
      # ========================================
      # SERVICE_HOST/SERVICE_PORT: 网关需要知道如何访问业务服务
      # 注意：这些配置用于服务注册，不是业务服务自身运行所需
      # - Docker 同网络：SERVICE_HOST 可以使用容器名（如 backend）
      # - 不同服务器：SERVICE_HOST 必须是业务服务器的实际 IP 或域名
      SERVICE_NAME: ${SERVICE_NAME:-project-oa}
      SERVICE_HOST: ${SERVICE_HOST:-backend}
      SERVICE_PORT: ${SERVICE_PORT:-8082}
      
      # ========================================
      # 业务应用配置
      # ========================================
      # 数据库配置
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-project_oa}
      DB_USER: ${DB_USER:-project_oa_user}
      DB_PASSWORD: ${DB_PASSWORD:-project_oa_password}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      DB_TYPE: ${DB_TYPE:-postgresql}
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      # 存储配置
      STORAGE_TYPE: ${STORAGE_TYPE:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-project-files}
      MINIO_USE_SSL: "${MINIO_USE_SSL:-false}"
      # OSS 配置（当 STORAGE_TYPE=oss 时使用）
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
      # 认证配置
      AUTH_MODE: ${AUTH_MODE:-self_validate}
      NEBULA_AUTH_URL: ${NEBULA_AUTH_URL:-http://localhost:8080}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8082}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      # 端口映射：将容器内的 SERVER_PORT 映射到宿主机的相同端口
      # 注意：这是业务服务的访问端口，不是服务注册端口
      - "${SERVER_PORT:-8082}:${SERVER_PORT:-8082}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - project-oa-network
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${SERVER_PORT:-8082}/${SERVICE_NAME:-project-oa}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-oa-frontend
    # 注意：Vite 环境变量在构建时已注入到静态文件中，运行时不需要
    # 如果需要运行时环境变量，可以在这里添加
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - project-oa-network
    restart: ${RESTART_POLICY:-unless-stopped}

volumes:
  postgres_data:
  minio_data:

networks:
  project-oa-network:
    driver: bridge
