version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: project-oa-postgres
    environment:
      POSTGRES_DB: project_oa
      POSTGRES_USER: project_oa_user
      POSTGRES_PASSWORD: project_oa_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - project-oa-network

  minio:
    image: minio/minio:latest
    container_name: project-oa-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - project-oa-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-oa-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: project_oa
      DB_USER: project_oa_user
      DB_PASSWORD: project_oa_password
      JWT_SECRET: your_jwt_secret_key_here
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: project-files
      MINIO_USE_SSL: "false"
      SERVER_PORT: 8082
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - minio
    networks:
      - project-oa-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-oa-frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8082/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - project-oa-network

volumes:
  postgres_data:
  minio_data:

networks:
  project-oa-network:
    driver: bridge
