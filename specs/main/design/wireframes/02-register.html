<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页面 - 线框图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .wireframe { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border: 2px solid #333; }
        .header { border: 2px dashed #999; padding: 10px; margin-bottom: 20px; text-align: center; background: #e0e0e0; }
        .container { border: 2px dashed #999; padding: 40px; margin: 20px 0; }
        .form-group { margin: 20px 0; }
        .label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input { width: 100%; padding: 12px; border: 2px solid #ccc; border-radius: 4px; }
        .required { color: red; }
        .button { padding: 12px 24px; border: 2px solid #333; background: #fff; cursor: pointer; margin: 10px 5px; }
        .button-primary { background: #333; color: white; }
        .error { color: red; margin-top: 10px; padding: 10px; border: 2px dashed red; background: #ffe0e0; }
        .link { color: blue; text-decoration: underline; cursor: pointer; }
        .note { margin-top: 20px; padding: 10px; background: #f0f0f0; border-left: 4px solid #333; }
    </style>
</head>
<body>
    <div class="wireframe">
        <div class="header">
            <h1>注册页面 - 线框图</h1>
        </div>

        <!-- 正常状态 -->
        <div class="container">
            <h2>正常状态</h2>
            <div style="max-width: 400px; margin: 0 auto;">
                <h3 style="text-align: center; margin-bottom: 30px;">注册新账号</h3>
                
                <div class="form-group">
                    <label class="label">用户名 <span class="required">*</span></label>
                    <input type="text" class="input" placeholder="请输入用户名" />
                </div>
                
                <div class="form-group">
                    <label class="label">密码 <span class="required">*</span></label>
                    <input type="password" class="input" placeholder="请输入密码" />
                </div>
                
                <div class="form-group">
                    <label class="label">确认密码 <span class="required">*</span></label>
                    <input type="password" class="input" placeholder="请再次输入密码" />
                </div>
                
                <div class="form-group">
                    <label class="label">姓名</label>
                    <input type="text" class="input" placeholder="请输入姓名" />
                </div>
                
                <div class="form-group">
                    <label class="label">邮箱</label>
                    <input type="email" class="input" placeholder="请输入邮箱" />
                </div>
                
                <div class="form-group">
                    <button class="button button-primary" style="width: 100%;">注册</button>
                </div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <span class="link">已有账号？立即登录</span>
                </div>
            </div>
        </div>

        <!-- 错误状态 - 必填字段验证 -->
        <div class="container">
            <h2>错误状态 - 必填字段验证失败</h2>
            <div style="max-width: 400px; margin: 0 auto;">
                <h3 style="text-align: center; margin-bottom: 30px;">注册新账号</h3>
                
                <div class="form-group">
                    <label class="label">用户名 <span class="required">*</span></label>
                    <input type="text" class="input" style="border-color: red;" />
                    <div style="color: red; font-size: 12px; margin-top: 5px;">用户名不能为空</div>
                </div>
                
                <div class="form-group">
                    <label class="label">密码 <span class="required">*</span></label>
                    <input type="password" class="input" style="border-color: red;" />
                    <div style="color: red; font-size: 12px; margin-top: 5px;">密码不能为空</div>
                </div>
                
                <div class="form-group">
                    <label class="label">确认密码 <span class="required">*</span></label>
                    <input type="password" class="input" style="border-color: red;" />
                    <div style="color: red; font-size: 12px; margin-top: 5px;">两次输入的密码不一致</div>
                </div>
                
                <div class="form-group">
                    <button class="button button-primary" style="width: 100%;">注册</button>
                </div>
            </div>
        </div>

        <!-- 成功状态 -->
        <div class="container">
            <h2>成功状态 - 注册成功</h2>
            <div style="max-width: 400px; margin: 0 auto; text-align: center; padding: 40px;">
                <div style="color: green; font-size: 24px; margin-bottom: 20px;">✓</div>
                <h3>注册成功！</h3>
                <p style="margin: 20px 0;">您的账号已创建，请使用用户名和密码登录系统</p>
                <button class="button button-primary">立即登录</button>
            </div>
        </div>

        <div class="note">
            <strong>设计说明：</strong><br>
            - 注册表单居中显示，最大宽度400px<br>
            - 用户名、密码、确认密码为必填项，标注红色星号<br>
            - 支持表单验证，错误时显示红色边框和错误提示<br>
            - 注册成功后显示成功提示，可跳转到登录页面<br>
            - 提供返回登录页面的链接
        </div>
    </div>
</body>
</html>
