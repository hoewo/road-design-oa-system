# configmap.yaml
# Kubernetes ConfigMap示例

apiVersion: v1
kind: ConfigMap
metadata:
  name: your-service-config
data:
  NODE_ENV: "production"
  AUTH_MODE: "gateway"
  NEBULA_AUTH_URL: "http://nebula-auth-server:port"
  API_BASE_URL: "http://nebula-auth-server:port"
  SERVICE_NAME: "your-service"
  SERVICE_PORT: "port"
  SERVICE_HOST: "business-server"

---
# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: your-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: your-service
  template:
    metadata:
      labels:
        app: your-service
    spec:
      containers:
      - name: your-service
        image: your-service:latest
        ports:
        - containerPort: port
        envFrom:
        - configMapRef:
            name: your-service-config

