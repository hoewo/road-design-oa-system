# docker-compose.yml
# Docker Compose配置示例

version: '3.8'

services:
  your-service:
    build: .
    ports:
      - "port:port"
    environment:
      - NODE_ENV=production
      - AUTH_MODE=gateway
      - NEBULA_AUTH_URL=http://nebula-auth-server:port
      - API_BASE_URL=http://nebula-auth-server:port
      - SERVICE_NAME=your-service
      - SERVICE_PORT=port
      - SERVICE_HOST=business-server
    restart: always

