openapi: 3.0.3
info:
  title: 项目管理OA系统 API
  description: 基于Excel需求的项目管理OA系统API文档
  version: 1.0.0
  contact:
    name: 开发团队
    email: dev@company.com

servers:
  - url: http://localhost:8080/api/v1
    description: 开发环境
  - url: https://api.project-oa.com/api/v1
    description: 生产环境

security:
  - BearerAuth: []

paths:
  # 认证相关
  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "admin"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 用户名或密码错误

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      responses:
        '200':
          description: 登出成功

  # 项目管理
  /projects:
    get:
      tags:
        - 项目管理
      summary: 获取项目列表
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [planning, bidding, contract, production, completed, cancelled]
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer

    post:
      tags:
        - 项目管理
      summary: 创建新项目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 项目创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: 请求参数错误

  /projects/{id}:
    get:
      tags:
        - 项目管理
      summary: 获取项目详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          description: 项目不存在

    put:
      tags:
        - 项目管理
      summary: 更新项目信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: 项目不存在

    delete:
      tags:
        - 项目管理
      summary: 删除项目
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功
        '404':
          description: 项目不存在

  # 项目成员管理
  /projects/{id}/members:
    get:
      tags:
        - 项目成员
      summary: 获取项目成员列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectMember'

    post:
      tags:
        - 项目成员
      summary: 添加项目成员
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMember'

  # 文件管理
  /projects/{id}/files:
    get:
      tags:
        - 文件管理
      summary: 获取项目文件列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
            enum: [contract, bidding, design, audit, production, other]
      responses:
        '200':
          description: 文件列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/File'

    post:
      tags:
        - 文件管理
      summary: 上传文件
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                  enum: [contract, bidding, design, audit, production, other]
                description:
                  type: string
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'

  /files/{id}/download:
    get:
      tags:
        - 文件管理
      summary: 下载文件
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 文件下载
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: 文件不存在

  # 财务管理
  /projects/{id}/financial:
    get:
      tags:
        - 财务管理
      summary: 获取项目财务信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 财务信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFinancial'

    post:
      tags:
        - 财务管理
      summary: 添加财务记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFinancialRecordRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecord'

  # 奖金管理
  /projects/{id}/bonuses:
    get:
      tags:
        - 奖金管理
      summary: 获取项目奖金列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 奖金列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bonus'

    post:
      tags:
        - 奖金管理
      summary: 添加奖金记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBonusRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bonus'

  # 甲方管理
  /clients:
    get:
      tags:
        - 甲方管理
      summary: 获取甲方列表
      description: 获取甲方列表，支持搜索和分页。默认按创建时间倒序排列，最多返回100条记录。主要用于项目创建/编辑表单中的甲方选择。
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码（用于分页，但前端通常请求page=1, size=100以获取所有数据）
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: 每页数量（最大100，前端通常设置为100以获取所有数据）
        - name: keyword
          in: query
          schema:
            type: string
          description: 搜索关键词（支持按甲方名称、联系人、电话、邮箱搜索）
      responses:
        '200':
          description: 甲方列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer

    post:
      tags:
        - 甲方管理
      summary: 创建新甲方
      description: 创建新甲方。甲方名称必须唯一，如果重复将返回409错误。此接口主要用于项目创建/编辑表单中的快速创建功能。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: 甲方创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '409':
          description: 甲方名称已存在
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "甲方名称已存在，请使用已存在的甲方"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        real_name:
          type: string
        role:
          type: string
          enum: [admin, manager, business, designer, reviewer, finance]
        department:
          type: string
        phone:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: integer
        project_name:
          type: string
        project_number:
          type: string
        start_date:
          type: string
          format: date
        project_overview:
          type: string
        drawing_unit:
          type: string
        status:
          type: string
          enum: [planning, bidding, contract, production, completed, cancelled]
        client_id:
          type: integer
        manager_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            client:
              $ref: '#/components/schemas/Client'
            manager:
              $ref: '#/components/schemas/User'
            contracts:
              type: array
              items:
                $ref: '#/components/schemas/Contract'
            members:
              type: array
              items:
                $ref: '#/components/schemas/ProjectMember'
            files:
              type: array
              items:
                $ref: '#/components/schemas/File'
            financial_records:
              type: array
              items:
                $ref: '#/components/schemas/FinancialRecord'
            bonuses:
              type: array
              items:
                $ref: '#/components/schemas/Bonus'

    Client:
      type: object
      properties:
        id:
          type: integer
        client_name:
          type: string
          description: 甲方名称（唯一，2-100字符）
          minLength: 2
          maxLength: 100
        contact_name:
          type: string
          description: 联系人姓名（可选）
        contact_phone:
          type: string
          description: 联系电话（可选，11位手机号或固定电话格式）
        email:
          type: string
          format: email
          description: 邮箱地址（可选，有效邮箱格式）
        address:
          type: string
          description: 地址（可选）
        tax_number:
          type: string
          description: 统一社会信用代码（可选，18位格式）
        bank_account:
          type: string
          description: 银行账号（可选）
        bank_name:
          type: string
          description: 开户银行（可选）
        is_active:
          type: boolean
          description: 是否启用（默认true）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Contract:
      type: object
      properties:
        id:
          type: integer
        contract_number:
          type: string
        contract_type:
          type: string
        sign_date:
          type: string
          format: date
        contract_rate:
          type: number
          format: float
        contract_amount:
          type: number
          format: float
        file_path:
          type: string
        project_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        user_id:
          type: integer
        role:
          type: string
          enum: [manager, designer, participant, reviewer, auditor]
        join_date:
          type: string
          format: date
        leave_date:
          type: string
          format: date
        is_active:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    File:
      type: object
      properties:
        id:
          type: integer
        file_name:
          type: string
        original_name:
          type: string
        file_path:
          type: string
        file_size:
          type: integer
        file_type:
          type: string
        mime_type:
          type: string
        category:
          type: string
          enum: [contract, bidding, design, audit, production, other]
        description:
          type: string
        project_id:
          type: integer
        uploader_id:
          type: integer
        uploader:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FinancialRecord:
      type: object
      properties:
        id:
          type: integer
        record_type:
          type: string
          enum: [receivable, invoice, payment, expense]
        amount:
          type: number
          format: float
        invoice_number:
          type: string
        invoice_date:
          type: string
          format: date
        payment_date:
          type: string
          format: date
        description:
          type: string
        project_id:
          type: integer
        created_by_id:
          type: integer
        created_by:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Bonus:
      type: object
      properties:
        id:
          type: integer
        bonus_type:
          type: string
          enum: [business, production]
        amount:
          type: number
          format: float
        description:
          type: string
        project_id:
          type: integer
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        created_by_id:
          type: integer
        created_by:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectFinancial:
      type: object
      properties:
        total_contract_amount:
          type: number
          format: float
        total_receivable:
          type: number
          format: float
        total_invoiced:
          type: number
          format: float
        total_paid:
          type: number
          format: float
        total_outstanding:
          type: number
          format: float
        management_fee_rate:
          type: number
          format: float
        management_fee_amount:
          type: number
          format: float

    # 请求模型
    CreateProjectRequest:
      type: object
      required:
        - project_name
        - project_number
      properties:
        project_name:
          type: string
          description: 项目名称（必填）
          minLength: 2
          maxLength: 100
        project_number:
          type: string
          description: 项目编号（必填，唯一）
        start_date:
          type: string
          format: date
          description: 承接日期（可选）
        project_overview:
          type: string
          description: 项目概况（可选，最多1000字符）
          maxLength: 1000
        drawing_unit:
          type: string
          description: 出图单位（可选）
        client_id:
          type: integer
          description: 甲方ID（可选，支持创建项目时快速新建甲方）
        manager_id:
          type: integer
          description: 项目经理ID（可选）

    UpdateProjectRequest:
      type: object
      properties:
        project_name:
          type: string
        start_date:
          type: string
          format: date
        project_overview:
          type: string
        drawing_unit:
          type: string
        status:
          type: string
          enum: [planning, bidding, contract, production, completed, cancelled]

    CreateClientRequest:
      type: object
      required:
        - client_name
      properties:
        client_name:
          type: string
          description: 甲方名称（必填，唯一，2-100字符）
          minLength: 2
          maxLength: 100
        contact_name:
          type: string
          description: 联系人姓名（可选）
        contact_phone:
          type: string
          description: 联系电话（可选，11位手机号或固定电话格式）
        email:
          type: string
          format: email
          description: 邮箱地址（可选，有效邮箱格式）
        address:
          type: string
          description: 地址（可选）
        tax_number:
          type: string
          description: 统一社会信用代码（可选，18位格式）
        bank_account:
          type: string
          description: 银行账号（可选）
        bank_name:
          type: string
          description: 开户银行（可选）

    AddMemberRequest:
      type: object
      required:
        - user_id
        - role
        - join_date
      properties:
        user_id:
          type: integer
        role:
          type: string
          enum: [manager, designer, participant, reviewer, auditor]
        join_date:
          type: string
          format: date

    CreateFinancialRecordRequest:
      type: object
      required:
        - record_type
        - amount
      properties:
        record_type:
          type: string
          enum: [receivable, invoice, payment, expense]
        amount:
          type: number
          format: float
        invoice_number:
          type: string
        invoice_date:
          type: string
          format: date
        payment_date:
          type: string
          format: date
        description:
          type: string

    CreateBonusRequest:
      type: object
      required:
        - user_id
        - bonus_type
        - amount
      properties:
        user_id:
          type: integer
        bonus_type:
          type: string
          enum: [business, production]
        amount:
          type: number
          format: float
        description:
          type: string

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
