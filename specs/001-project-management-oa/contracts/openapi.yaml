openapi: 3.0.3
info:
  title: 项目管理OA系统 API
  description: 基于Excel需求的项目管理OA系统API文档
  version: 1.0.0
  contact:
    name: 开发团队
    email: dev@company.com

servers:
  - url: http://localhost:8080/api/v1
    description: 开发环境
  - url: https://api.project-oa.com/api/v1
    description: 生产环境

security:
  - BearerAuth: []

paths:
  # 认证相关
  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "admin"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 用户名或密码错误

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      responses:
        '200':
          description: 登出成功

  # 项目管理
  /projects:
    get:
      tags:
        - 项目管理
      summary: 获取项目列表
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [planning, bidding, contract, production, completed, cancelled]
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer

    post:
      tags:
        - 项目管理
      summary: 创建新项目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 项目创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: 请求参数错误

  /projects/{id}:
    get:
      tags:
        - 项目管理
      summary: 获取项目详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          description: 项目不存在

    put:
      tags:
        - 项目管理
      summary: 更新项目信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: 项目不存在

    delete:
      tags:
        - 项目管理
      summary: 删除项目
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功
        '404':
          description: 项目不存在

  # 项目经营信息管理
  /projects/{id}/business:
    get:
      tags:
        - 项目经营信息
      summary: 获取项目经营信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 经营信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectBusiness'
        '404':
          description: 项目不存在

    put:
      tags:
        - 项目经营信息
      summary: 更新项目经营信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectBusinessRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectBusiness'
        '404':
          description: 项目不存在

  # 专家费支付管理
  /projects/{id}/expert-fee-payments:
    get:
      tags:
        - 项目经营信息
      summary: 获取项目专家费支付列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 专家费支付列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpertFeePayment'
        '404':
          description: 项目不存在

    post:
      tags:
        - 项目经营信息
      summary: 添加专家费支付记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpertFeePaymentRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpertFeePayment'
        '404':
          description: 项目不存在

  # 项目成员管理
  /projects/{id}/members:
    get:
      tags:
        - 项目成员
      summary: 获取项目成员列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectMember'

    post:
      tags:
        - 项目成员
      summary: 添加项目成员
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMember'

  # 文件管理
  /projects/{id}/files:
    get:
      tags:
        - 文件管理
      summary: 获取项目文件列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
            enum: [contract, bidding, design, audit, production, other]
      responses:
        '200':
          description: 文件列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/File'

    post:
      tags:
        - 文件管理
      summary: 上传文件
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                  enum: [contract, bidding, design, audit, production, other]
                description:
                  type: string
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'

  /files/{id}/download:
    get:
      tags:
        - 文件管理
      summary: 下载文件
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 文件下载
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: 文件不存在

  # 合同管理
  /projects/{id}/contracts:
    get:
      tags:
        - 合同管理
      summary: 获取项目合同列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 合同列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contract'
        '404':
          description: 项目不存在

    post:
      tags:
        - 合同管理
      summary: 创建合同
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'
        '404':
          description: 项目不存在

  # 合同补充协议管理
  /contracts/{id}/amendments:
    get:
      tags:
        - 合同管理
      summary: 获取合同补充协议列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 补充协议列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContractAmendment'
        '404':
          description: 合同不存在

    post:
      tags:
        - 合同管理
      summary: 添加合同补充协议
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractAmendmentRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractAmendment'
        '404':
          description: 合同不存在

  # 财务管理
  /projects/{id}/financial:
    get:
      tags:
        - 财务管理
      summary: 获取项目财务信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 财务信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFinancial'

    post:
      tags:
        - 财务管理
      summary: 添加财务记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFinancialRecordRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecord'

  # 奖金管理
  /projects/{id}/bonuses:
    get:
      tags:
        - 奖金管理
      summary: 获取项目奖金列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 奖金列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bonus'

    post:
      tags:
        - 奖金管理
      summary: 添加奖金记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBonusRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bonus'

  # 甲方管理
  /clients:
    get:
      tags:
        - 甲方管理
      summary: 获取甲方列表
      description: 获取甲方列表，支持搜索和分页。默认按创建时间倒序排列，最多返回100条记录。主要用于项目创建/编辑表单中的甲方选择。
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码（用于分页，但前端通常请求page=1, size=100以获取所有数据）
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: 每页数量（最大100，前端通常设置为100以获取所有数据）
        - name: keyword
          in: query
          schema:
            type: string
          description: 搜索关键词（支持按甲方名称、联系人、电话、邮箱搜索）
      responses:
        '200':
          description: 甲方列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer

    post:
      tags:
        - 甲方管理
      summary: 创建新甲方
      description: 创建新甲方。甲方名称必须唯一，如果重复将返回409错误。此接口主要用于项目创建/编辑表单中的快速创建功能。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: 甲方创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '409':
          description: 甲方名称已存在
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "甲方名称已存在，请使用已存在的甲方"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        real_name:
          type: string
        role:
          type: string
          enum: [admin, manager, business, designer, reviewer, finance]
        department:
          type: string
        phone:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: integer
        project_name:
          type: string
        project_number:
          type: string
        start_date:
          type: string
          format: date
        project_overview:
          type: string
        drawing_unit:
          type: string
        status:
          type: string
          enum: [planning, bidding, contract, production, completed, cancelled]
        client_id:
          type: integer
        manager_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            client:
              $ref: '#/components/schemas/Client'
            manager:
              $ref: '#/components/schemas/User'
            contracts:
              type: array
              items:
                $ref: '#/components/schemas/Contract'
            members:
              type: array
              items:
                $ref: '#/components/schemas/ProjectMember'
            files:
              type: array
              items:
                $ref: '#/components/schemas/File'
            financial_records:
              type: array
              items:
                $ref: '#/components/schemas/FinancialRecord'
            bonuses:
              type: array
              items:
                $ref: '#/components/schemas/Bonus'

    ProjectBusiness:
      type: object
      description: 项目经营信息
      properties:
        project_id:
          type: integer
        client_id:
          type: integer
          nullable: true
          description: 甲方ID（可选，最多关联一个）
        client:
          $ref: '#/components/schemas/Client'
          nullable: true
          description: 甲方信息（可选）
        contact_name:
          type: string
          description: 联系人姓名（可选）
        contact_phone:
          type: string
          description: 联系电话（可选）
        business_manager:
          type: string
          description: 经营负责人（可选）
        bidding_info:
          type: object
          description: 招投标信息（可选）
          properties:
            bidding_documents:
              type: array
              items:
                $ref: '#/components/schemas/File'
            bidding_status:
              type: string
              enum: [not_started, in_progress, won, lost]
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/Contract'
        updated_at:
          type: string
          format: date-time

    UpdateProjectBusinessRequest:
      type: object
      description: 更新项目经营信息请求
      properties:
        client_id:
          type: integer
          nullable: true
          description: 甲方ID（可选，设置为null可删除关联）
        contact_name:
          type: string
          description: 联系人姓名（可选）
        contact_phone:
          type: string
          description: 联系电话（可选）
        business_manager:
          type: string
          description: 经营负责人（可选）

    Client:
      type: object
      properties:
        id:
          type: integer
        client_name:
          type: string
          description: 甲方名称（唯一，2-100字符）
          minLength: 2
          maxLength: 100
        contact_name:
          type: string
          description: 联系人姓名（可选）
        contact_phone:
          type: string
          description: 联系电话（可选，11位手机号或固定电话格式）
        email:
          type: string
          format: email
          description: 邮箱地址（可选，有效邮箱格式）
        address:
          type: string
          description: 地址（可选）
        tax_number:
          type: string
          description: 统一社会信用代码（可选，18位格式）
        bank_account:
          type: string
          description: 银行账号（可选）
        bank_name:
          type: string
          description: 开户银行（可选）
        is_active:
          type: boolean
          description: 是否启用（默认true）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Contract:
      type: object
      properties:
        id:
          type: integer
        contract_number:
          type: string
        contract_type:
          type: string
        sign_date:
          type: string
          format: date
        contract_rate:
          type: number
          format: float
        contract_amount:
          type: number
          format: float
          description: 合同金额（应等于设计费+勘察费+咨询费之和）
        design_fee:
          type: number
          format: float
          description: 设计费
        survey_fee:
          type: number
          format: float
          description: 勘察费
        consultation_fee:
          type: number
          format: float
          description: 咨询费
        file_path:
          type: string
        project_id:
          type: integer
        amendments:
          type: array
          items:
            $ref: '#/components/schemas/ContractAmendment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ContractAmendment:
      type: object
      properties:
        id:
          type: integer
        amendment_number:
          type: string
        sign_date:
          type: string
          format: date
        file_path:
          type: string
        description:
          type: string
        contract_id:
          type: integer
        contract:
          $ref: '#/components/schemas/Contract'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        user_id:
          type: integer
        role:
          type: string
          enum: [manager, designer, participant, reviewer, auditor, business_manager, business_personnel]
          description: 项目成员角色，支持一人多角色（通过多条记录实现）
        join_date:
          type: string
          format: date
        leave_date:
          type: string
          format: date
        is_active:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    File:
      type: object
      properties:
        id:
          type: integer
        file_name:
          type: string
        original_name:
          type: string
        file_path:
          type: string
        file_size:
          type: integer
        file_type:
          type: string
        mime_type:
          type: string
        category:
          type: string
          enum: [contract, bidding, design, audit, production, other]
        description:
          type: string
        project_id:
          type: integer
        uploader_id:
          type: integer
        uploader:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FinancialRecord:
      type: object
      properties:
        id:
          type: integer
        record_type:
          type: string
          enum: [receivable, invoice, payment, expense]
        fee_type:
          type: string
          enum: [design_fee, survey_fee, consultation_fee]
          description: 费用类型（设计费、勘察费、咨询费）
        receivable_amount:
          type: number
          format: float
          description: 应收金额
        invoice_number:
          type: string
          description: 发票号
        invoice_date:
          type: string
          format: date
          description: 开票时间
        invoice_amount:
          type: number
          format: float
          description: 开票金额
        payment_date:
          type: string
          format: date
          description: 支付时间
        payment_amount:
          type: number
          format: float
          description: 支付金额
        unpaid_amount:
          type: number
          format: float
          description: 未收金额（计算字段：应收金额-支付金额）
        description:
          type: string
        project_id:
          type: integer
        created_by_id:
          type: integer
        created_by:
          $ref: '#/components/schemas/User'
