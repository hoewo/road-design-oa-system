<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_NAME}} - 线框图</title>
    <style>
        /* 线框图样式系统 - 使用CSS变量统一管理 */
        :root {
            --gray-0: #000000; --gray-1: #333333; --gray-2: #666666; --gray-3: #999999;
            --gray-4: #cccccc; --gray-5: #e5e5e5; --gray-6: #f5f5f5; --white: #ffffff;
            --border-width: 1px; --border-radius: 4px;
            --spacing-xs: 0.25rem; --spacing-sm: 0.5rem; --spacing-md: 1rem;
            --spacing-lg: 1.5rem; --spacing-xl: 2rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 16px; line-height: 1.6; color: var(--gray-1);
            background-color: var(--gray-6); padding: var(--spacing-xl);
        }
        .wireframe-container {
            max-width: 1200px; margin: 0 auto; background-color: var(--white);
            border: var(--border-width) solid var(--gray-4); border-radius: var(--border-radius);
            padding: var(--spacing-xl);
        }
        header {
            border-bottom: 2px solid var(--gray-4); padding-bottom: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        h1 { font-size: 2rem; font-weight: 600; color: var(--gray-0); margin-bottom: var(--spacing-sm); }
        .meta-info {
            display: flex; gap: var(--spacing-lg); flex-wrap: wrap;
            color: var(--gray-2); font-size: 0.9rem;
        }
        .meta-info code {
            background-color: var(--gray-6); padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--border-radius); font-family: "SF Mono", Monaco, monospace;
            font-size: 0.85rem;
        }
        /* 状态区块 */
        details {
            margin-bottom: var(--spacing-lg); border: var(--border-width) solid var(--gray-4);
            border-radius: var(--border-radius); overflow: hidden;
        }
        details[open] { border-color: var(--gray-1); }
        summary {
            cursor: pointer; padding: var(--spacing-md); background-color: var(--gray-6);
            font-weight: 600; font-size: 1.1rem; color: var(--gray-1);
            user-select: none; transition: background-color 0.2s;
        }
        summary:hover { background-color: var(--gray-5); }
        details[open] summary { background-color: var(--gray-1); color: var(--white); }
        .state-content { padding: var(--spacing-lg); }
        .state-description {
            color: var(--gray-2); margin-bottom: var(--spacing-lg); padding: var(--spacing-md);
            background-color: var(--gray-6); border-left: 3px solid var(--gray-3);
            border-radius: var(--border-radius);
        }
        /* 线框图画布 */
        .wireframe-canvas {
            border: 2px solid var(--gray-1); border-radius: var(--border-radius);
            padding: var(--spacing-lg); background-color: var(--white); min-height: 400px;
        }
        .device-frame {
            max-width: 375px; margin: 0 auto; border: 2px solid var(--gray-1);
            border-radius: 12px; overflow: hidden;
        }
        .device-frame.tablet { max-width: 768px; }
        .device-frame.desktop { max-width: 100%; border-radius: 8px; }
        /* 通用组件 */
        .nav-bar {
            background-color: var(--gray-6); border-bottom: var(--border-width) solid var(--gray-4);
            padding: var(--spacing-md); display: flex; align-items: center;
            justify-content: space-between;
        }
        .nav-title { font-weight: 600; color: var(--gray-0); }
        .nav-button {
            width: 60px; height: 32px; border: var(--border-width) solid var(--gray-3);
            border-radius: var(--border-radius); background-color: var(--white);
        }
        .content-area { padding: var(--spacing-md); }
        .list-item {
            border: var(--border-width) solid var(--gray-4); border-radius: var(--border-radius);
            padding: var(--spacing-md); margin-bottom: var(--spacing-sm);
            background-color: var(--white);
        }
        .button {
            display: inline-block; padding: var(--spacing-sm) var(--spacing-lg);
            border: 2px solid var(--gray-1); border-radius: var(--border-radius);
            background-color: var(--white); color: var(--gray-1);
            text-align: center; font-weight: 600; cursor: pointer;
        }
        .button.primary { background-color: var(--gray-1); color: var(--white); }
        .input-field {
            width: 100%; padding: var(--spacing-sm);
            border: var(--border-width) solid var(--gray-4); border-radius: var(--border-radius);
            background-color: var(--white); margin-bottom: var(--spacing-sm);
        }
        .placeholder-box {
            background-color: var(--gray-6); border: var(--border-width) dashed var(--gray-3);
            border-radius: var(--border-radius); padding: var(--spacing-lg);
            text-align: center; color: var(--gray-3); margin: var(--spacing-sm) 0;
        }
        .icon-placeholder {
            width: 24px; height: 24px; border: var(--border-width) solid var(--gray-3);
            border-radius: 50%; display: inline-block; background-color: var(--gray-5);
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--gray-5);
            border-top-color: var(--gray-1); border-radius: 50%; display: inline-block;
        }
        /* 弹窗样式 ⚠️ 重要：线框图中直接展示，不真实弹窗，不使用 position: fixed 或 z-index */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.1); border: 2px dashed var(--gray-3);
            border-radius: var(--border-radius); padding: var(--spacing-lg);
            margin: var(--spacing-md) 0; position: relative;
        }
        .modal-content {
            background-color: var(--white); border: 3px solid var(--gray-1);
            border-radius: var(--border-radius); padding: var(--spacing-lg);
            margin: var(--spacing-md) auto; max-width: 400px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); position: relative;
        }
        .modal-content::before {
            content: "弹窗/对话框"; position: absolute; top: -12px; left: var(--spacing-md);
            background-color: var(--white); padding: 2px 8px; font-size: 0.75rem;
            color: var(--gray-2); border: 1px solid var(--gray-3); border-radius: 3px;
        }
        /* 组件清单和交互说明 */
        .component-list, .interactions {
            margin-top: var(--spacing-lg); padding: var(--spacing-md);
            background-color: var(--gray-6); border-radius: var(--border-radius);
        }
        .component-list h3, .interactions h3 {
            font-size: 1rem; margin-bottom: var(--spacing-sm); color: var(--gray-1);
        }
        .component-list ul { list-style: none; padding-left: 0; }
        .component-list li {
            padding: var(--spacing-xs) 0; color: var(--gray-2); font-size: 0.9rem;
        }
        .component-list li::before { content: "▸ "; color: var(--gray-3); }
        .interaction-item {
            padding: var(--spacing-sm); margin-bottom: var(--spacing-xs);
            background-color: var(--white); border-left: 3px solid var(--gray-3);
            border-radius: var(--border-radius); font-size: 0.9rem;
        }
        .interaction-item code {
            background-color: var(--gray-6); padding: 2px 6px;
            border-radius: 3px; font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            body { padding: var(--spacing-md); }
            .wireframe-container { padding: var(--spacing-md); }
            h1 { font-size: 1.5rem; }
            .meta-info { flex-direction: column; gap: var(--spacing-sm); }
        }
    </style>
</head>
<body>
    <div class="wireframe-container">
        <header>
            <h1>{{PAGE_NAME}}</h1>
            <div class="meta-info">
                <div>View: <code>{{VIEW_NAME}}</code></div>
                <div>平台: <strong>{{PLATFORM}}</strong></div>
                <div>导航层级: <strong>{{NAV_LEVEL}}</strong></div>
            </div>
        </header>

        <!--
        ===== 线框图生成指南 =====
        
        1. 状态要求：至少包含4个状态（加载中、成功、空状态、错误），每个状态使用 <details> 包裹，第一个设置 open
        
        2. 状态结构（必须包含）：
           <details [open]>
               <summary>状态名称</summary>
               <div class="state-content">
                   <div class="state-description"><strong>触发条件：</strong>描述</div>
                   <div class="wireframe-canvas"> [UI内容...（实际内容）] </div>
                   <div class="component-list"><h3>组件清单</h3><ul><li>组件</li></ul></div>
                   <div class="interactions"><h3>交互行为</h3><div class="interaction-item"><code>操作</code> → 结果</div></div>
               </div>
           </details>
        
        3. 弹窗处理 ⚠️ 重要：
           - 弹窗必须直接展示在页面上，不要使用真实弹窗（position: fixed/z-index）
           - 使用: <div class="modal-overlay"><div class="modal-content">内容</div></div>
           - 弹窗放在 .wireframe-canvas 中，通过边框和背景区分
        
        4. 设备框架：iOS用.device-frame，iPad用.device-frame.tablet，macOS用.device-frame.desktop
        
        5. 组件类：.nav-bar/.nav-title/.nav-button, .list-item, .button/.button.primary, .input-field, .spinner/.placeholder-box, .icon-placeholder
        -->

        <!-- 示例状态：加载中（参考此结构生成其他状态） -->
        <details open>
            <summary>加载中</summary>
            <div class="state-content">
                <div class="state-description">
                    <strong>触发条件：</strong>页面首次加载或数据刷新时
                </div>
                <div class="wireframe-canvas">
                    <div class="device-frame">
                        <div class="nav-bar">
                            <div class="nav-button"></div>
                            <div class="nav-title">{{PAGE_NAME}}</div>
                            <div class="nav-button"></div>
                        </div>
                        <div class="content-area">
                            <div class="placeholder-box">
                                <div class="spinner"></div>
                                <p style="margin-top: 1rem;">加载中...</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="component-list">
                    <h3>组件清单</h3>
                    <ul>
                        <li>导航栏 + 加载指示器</li>
                    </ul>
                </div>
                <div class="interactions">
                    <h3>交互行为</h3>
                    <div class="interaction-item">
                        <code>点击返回</code> → 返回上一页
                    </div>
                </div>
            </div>
        </details>

        <!-- 请根据实际需求生成其他状态：成功、空状态、错误、弹窗等 -->
        <!-- 弹窗示例：<div class="modal-overlay"><div class="modal-content">弹窗内容</div></div> -->

    </div>
</body>
</html>
