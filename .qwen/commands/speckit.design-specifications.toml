description = "Create or update design specifications documentation including visual design, interaction design, components, and states."

prompt = """
---
description: Create or update design specifications documentation including visual design, interaction design, components, and states.
---

## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Outline

1. **Setup**: Run `.specify/scripts/bash/setup-specifications.sh --json` from repo root and parse JSON for SPECIFICATIONS_DIR, OVERVIEW_FILE, FEATURE_SPEC, BRANCH. For single quotes in args like "I'm Groot", use escape syntax: e.g 'I'\\''m Groot' (or double-quote if possible: "I'm Groot").

2. **Load context**: Read FEATURE_SPEC to extract product name and feature context. Load design specification templates from design-specifications-template.md.

3. **Execute specification workflow**:
   - If `overview.md` doesn't exist, create it from template
   - Extract product name from FEATURE_SPEC (from "Feature Specification: [FEATURE NAME]")
   - Fill specification overview template with product context
   - Create/update individual specification files as needed:
     - `visual-design.md` - Visual design system
     - `interaction-design.md` - Interaction patterns
     - `components.md` - Component specifications
     - `states.md` - State definitions
   - Update overview.md to reference all specification files

4. **Stop and report**: Command ends after creating/updating specification files. Report branch, SPECIFICATIONS_DIR path, and generated files.

## Specification Template Structure

From `.specify/templates/design-specifications-template.md`, extract sections:

### Section 3: Design Specification Overview Template (`specifications/overview.md`)

The overview template includes:
- Document description with product name placeholder
- Specification document list (visual-design, interaction-design, components, states)
- Design principles (consistency, accessibility, performance, usability, internationalization)
- Technical implementation requirements (iOS/macOS)
- Design token structure
- Design specification maintenance guidelines

### Section 4: Visual Design Specification Template (`specifications/visual-design.md`)

Includes:
- Color system (primary, secondary, semantic, neutral)
- Typography system (font family, sizes, weights)
- Spacing system
- Corner radius system
- Shadow system
- Icon system
- Animation system
- SwiftUI implementation examples

### Section 5: Interaction Design Specification Template (`specifications/interaction-design.md`)

Includes:
- Interaction patterns (navigation, selection, editing)
- Gesture operations (iOS/macOS)
- Animation effects
- Feedback mechanisms
- Interaction response times
- Error handling

### Section 6: Component Specification Template (`specifications/components.md`)

Includes:
- Component classification (basic, composite, page)
- Detailed component specifications:
  - Component information
  - Usage description
  - Visual specifications
  - State definitions
  - Property specifications
  - Interaction behaviors
  - Accessibility support
  - Usage examples
  - Design and implementation notes

### Section 7: State Definition Template (`specifications/states.md`)

Includes:
- Global states (loading, error, empty)
- Interface-specific states
- State transition diagrams
- State coverage checklist

## Execution Steps

1. **Parse setup script output**:
   - Extract SPECIFICATIONS_DIR, OVERVIEW_FILE paths
   - Extract FEATURE_SPEC path for context

2. **Read feature specification**:
   - Extract feature name from spec.md header
   - Extract platform requirements (iOS/macOS)
   - Extract design-related requirements

3. **Create/update overview.md**:
   - If file doesn't exist, create from template (section 1 of design-specifications-template.md)
   - Replace `{产品名称}` with actual product/feature name
   - Fill design principles based on Constitution requirements
   - Update technical implementation requirements based on platform

4. **Create/update individual specification files** (if they don't exist or user requests update):
   - `visual-design.md`: Create from template (section 2 of design-specifications-template.md)
   - `interaction-design.md`: Create from template (section 3 of design-specifications-template.md)
   - `components.md`: Create from template (section 4 of design-specifications-template.md)
   - `states.md`: Create from template (section 5 of design-specifications-template.md)

5. **Validate completeness**:
   - Check that overview.md exists
   - Verify all four core specification files exist (if required)
   - Ensure all design values reference DesignTokens
   - Verify Constitution compliance (accessibility, performance, internationalization)

## Key Rules

- Use absolute paths for all file operations
- Product name comes from FEATURE_SPEC header: "Feature Specification: [FEATURE NAME]"
- All design values MUST use DesignTokens (no hardcoded values)
- Must comply with Constitution requirements:
  - Accessibility: VoiceOver and dynamic font support
  - Performance: 60fps UI, <100ms interaction response
  - Internationalization: Multi-language support, text length adaptation
- Specifications are located at `specs/main/design/specifications/` (shared across all features)

## Output Files

- `specs/main/design/specifications/overview.md` - Specification overview (required)
- `specs/main/design/specifications/visual-design.md` - Visual design system (core)
- `specs/main/design/specifications/interaction-design.md` - Interaction patterns (core)
- `specs/main/design/specifications/components.md` - Component specifications (core)
- `specs/main/design/specifications/states.md` - State definitions (core)
"""
