description = "Execute the implementation planning workflow using the plan template to generate design artifacts."

prompt = """
---
description: Execute the implementation planning workflow using the plan template to generate design artifacts.
---

## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Outline

1. **Setup**: Run `.specify/scripts/bash/setup-plan.sh --json` from repo root and parse JSON for FEATURE_SPEC, IMPL_PLAN, SPECS_DIR, BRANCH, and PLAN_EXISTS flag. For single quotes in args like "I'm Groot", use escape syntax: e.g 'I'\\''m Groot' (or double-quote if possible: "I'm Groot").
   
   **Important**: The `PLAN_EXISTS` flag indicates whether `plan.md` already exists:
   - If `PLAN_EXISTS` is `true`: The plan file already exists and should be updated in place
   - If `PLAN_EXISTS` is `false`: A new plan file was created from template and should be filled from scratch

2. **Load context**: 
   - Read FEATURE_SPEC and `.specify/memory/constitution.md`
   - **If PLAN_EXISTS is true**: Read the existing IMPL_PLAN file to identify what has already been filled
   - **If PLAN_EXISTS is false**: The IMPL_PLAN template has been copied and is ready to be filled
   
   **Note on Design Resources**: Plan phase focuses on technical architecture, technology stack selection, data models, and API design. Wireframes and design specifications are UI/UX-level details that are typically determined after the technical plan is established. Therefore, this command does **NOT** read wireframes or design specifications. These design resources will be used in the Tasks phase (to generate UI-related tasks) and Implement phase (to guide UI implementation).

3. **Execute plan workflow**: 
   
   **If PLAN_EXISTS is false** (new plan):
   - Fill Technical Context (mark unknowns as "NEEDS CLARIFICATION")
   - Fill Constitution Check section from constitution
   - Evaluate gates (ERROR if violations unjustified)
   - Phase 0: Generate research.md (resolve all NEEDS CLARIFICATION)
   - Phase 1: Generate data-model.md, contracts/, quickstart.md
   - Phase 1: Update agent context by running the agent script
   - Re-evaluate Constitution Check post-design
   
   **If PLAN_EXISTS is true** (updating existing plan):
   - **Read existing plan.md** and identify what has already been filled:
     - Technical Context: Check if fields are filled or still have "NEEDS CLARIFICATION"
     - Constitution Check: Check if compliance checks are complete
     - Project Structure: Check if structure is defined
     - Phase outputs: Check which phase outputs exist (research.md, data-model.md, contracts/, quickstart.md)
   - **Update only what needs updating**:
     - If Technical Context has "NEEDS CLARIFICATION" → resolve and update those fields
     - If Constitution Check is incomplete → complete the missing checks
     - If Project Structure is undefined → fill it based on current requirements
     - If Phase 0 output (research.md) is missing → generate it (resolve all NEEDS CLARIFICATION)
     - If Phase 1 outputs are missing → generate them (data-model.md, contracts/, quickstart.md)
     - **Preserve existing content**: Keep all already-filled sections, completed phase outputs, and manual edits
   - **Re-evaluate Constitution Check** if any design artifacts were updated
   - **Update agent context** by running the agent script (only if new technology was added)

4. **Stop and report**: Command ends after Phase 2 planning. Report branch, IMPL_PLAN path, and generated artifacts.

## Phases

### Phase 0: Outline & Research

1. **Extract unknowns from Technical Context** above:
   - For each NEEDS CLARIFICATION → research task
   - For each dependency → best practices task
   - For each integration → patterns task

2. **Generate and dispatch research agents**:

   ```text
   For each unknown in Technical Context:
     Task: "Research {unknown} for {feature context}"
   For each technology choice:
     Task: "Find best practices for {tech} in {domain}"
   ```

3. **Consolidate findings** in `research.md` using format:
   - Decision: [what was chosen]
   - Rationale: [why chosen]
   - Alternatives considered: [what else evaluated]

**Output**: research.md with all NEEDS CLARIFICATION resolved

### Phase 1: Design & Contracts

**Prerequisites:** `research.md` complete

1. **Extract entities from feature spec** → `data-model.md`:
   - Entity name, fields, relationships
   - Validation rules from requirements
   - State transitions if applicable

2. **Generate API contracts** from functional requirements:
   - For each user action → endpoint
   - Use standard REST/GraphQL patterns
   - Output OpenAPI/GraphQL schema to `/contracts/`

3. **Agent context update**:
   - Run `.specify/scripts/bash/update-agent-context.sh qwen`
   - These scripts detect which AI agent is in use
   - Update the appropriate agent-specific context file
   - Add only new technology from current plan
   - Preserve manual additions between markers

**Output**: data-model.md, /contracts/*, quickstart.md, agent-specific file

## Key rules

- Use absolute paths
- ERROR on gate failures or unresolved clarifications
"""
