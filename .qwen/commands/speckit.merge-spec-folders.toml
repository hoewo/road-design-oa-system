description = ""

prompt = """
# merge-spec-folders

## 描述
解析用户关于“将某个规范分支内容合入主规范”的自然语言需求，利用 AI 对两个指定文件夹的内容进行深度语义分析与智能合并：同名 Markdown 文件按标题级别融合，非 Markdown 文件依据格式执行结构化整合或差异复制，并在关键节点给出计划与确认提示。**严禁直接调用脚本/命令行工具进行简单复制或覆盖，所有合并必须基于内容理解和逐段生成。**

## 参数
- 基准文件夹: 用户会以“合并到 000-all”或“目标是 specs/000-all”这类表述指明接收方路径
- 被合入文件夹: 用户会以“从 003 合并”或“源目录是 specs/003-review-file-access”这类表述指明增量来源
- 处理范围/限制（可选）: 用户若补充“只处理 data-model”或“排除 comments 目录”，需识别为筛选条件
- 输出期望（可选）: 用户若说明“先给我预览差异”或“直接执行”，需据此调整执行节奏

## 执行步骤
1. **理解需求**：读取用户自然语言，识别这是文件夹合并任务，并确认期望的整体策略（以增量为主、执行深度整合）。
2. **提取参数**：解析并验证基准文件夹与被合入文件夹路径（支持相对/绝对路径），补充可选范围或输出要求。
3. **澄清与确认**：若路径、范围或策略存在歧义，立即提问澄清；全部关键信息确认无误后再继续，并重申“合并通过 AI 内容分析完成，不执行 shell 脚本”。
4. **生成合并计划**：递归扫描两侧目录，匹配同名文件；对 Markdown 文件解析标题层级，构建章节级合并映射；对非 Markdown 文件分析格式（JSON、文本、二进制等），决定合并或复制策略；标记需要 AI 深度改写的段落；产出详细计划（新增/合并/冲突列表），同时注明将通过逐段生成或 apply_patch 等方式实现。
5. **决策点 1 - 计划确认**：展示合并计划摘要（含受影响文件、章节冲突、潜在风险），等待用户确认是否按计划继续。
6. **执行合并**：逐项落实计划；Markdown 文件按标题顺序整合内容（相同标题合并，缺失标题追加），在 AI 层面生成新的章节文本，再通过文件编辑命令写入；非 Markdown 文件根据格式执行结构化合并（如 JSON 字段合并、文本差异整合），禁止使用 `cp/rsync/git apply` 等脚本方式直接覆盖；记录所有改动。
7. **决策点 2 - 执行授权**：如用户要求“直接执行”则可在决策点 1 后继续，否则在实际写入前再次确认；必要时提供待写入片段预览，并再次提醒不会调用脚本工具。
8. **结果回报**：列出已合并文件、剩余需人工处理的冲突（若有），并提示进一步验证或测试步骤。

## 澄清问题
- 无法确定基准或被合入文件夹路径时（多候选或路径不存在）
- 用户未明确是否排除某些目录/文件，且这些内容可能引发大规模变更
- 同名文件包含非 Markdown 且格式差异大，需要确认具体处理方式
- 用户提到了“只看计划”或“直接执行”但语义不清晰，需确认是否跳过某些决策点
- 检测到潜在高风险操作（例如会覆盖大量文件）时

## 人类决策点
- **决策点 1**：展示合并计划（文件列表、章节冲突、处理策略）→ 需用户确认计划是否可执行
- **决策点 2**：执行文件写入操作前 → 需用户授权实际修改文件；若用户在需求中声明“直接执行”，仍需在此提醒风险
"""
